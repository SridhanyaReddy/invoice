<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>InvoGen - Professional Invoice Generator</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
</head>

<body>
    <div class="app-container">
        <!-- Sidebar -->
        <nav class="sidebar">
            <div class="logo-section">
                <i class="fas fa-file-invoice-dollar fa-2x"></i>
                <h1>InvoGen</h1>
            </div>
            <ul class="nav-menu">
                <li class="nav-item">
                    <a href="#" class="nav-link active" data-page="dashboard">
                        <i class="fas fa-chart-line"></i> Dashboard
                    </a>
                </li>
                <li class="nav-item">
                    <a href="#" class="nav-link" data-page="create-invoice">
                        <i class="fas fa-plus-circle"></i> Create Invoice
                    </a>
                </li>
                <li class="nav-item">
                    <a href="#" class="nav-link" data-page="settings">
                        <i class="fas fa-cog"></i> Settings
                    </a>
                </li>
            </ul>
            <div class="theme-toggle">
                <button id="toggle-theme" class="btn btn-secondary" style="width: 100%">
                    <i class="fas fa-moon"></i> Dark Mode
                </button>
            </div>
        </nav>

        <!-- Main Content -->
        <main class="main-content">
            <header>
                <h2 id="page-title" class="page-title">Dashboard</h2>
                <div id="loading-spinner" style="display: none;">
                    <div class="loader" style="border-top-color: var(--primary-color);"></div>
                </div>
            </header>

            <!-- Dashboard Section -->
            <section id="dashboard-section" class="page-section">
                <div class="card mb-4" style="margin-bottom: 2rem;">
                    <div class="search-bar" style="display: flex; gap: 1rem;">
                        <input type="text" id="search-input" class="form-control"
                            placeholder="Search by Customer Name, Phone, or ID...">
                        <button class="btn btn-primary" id="search-btn">Search</button>
                    </div>
                </div>

                <div class="card">
                    <h3>Recent Invoices</h3>
                    <div id="invoice-list" style="margin-top: 1rem;">
                        <!-- Invoices will be loaded here -->
                        <p style="color: var(--text-secondary); text-align: center; padding: 2rem;">No invoices found.
                            Create one to get started!</p>
                    </div>
                </div>
            </section>

            <!-- Create/Edit Invoice Section -->
            <section id="create-invoice-section" class="page-section" style="display: none;">
                <div class="card">
                    <form id="invoice-form">
                        <input type="hidden" id="invoice-mongodb-id">
                        <input type="hidden" id="invoice-custom-id">
                        <div class="grid grid-2">
                            <div class="form-group">
                                <label>Customer Name</label>
                                <input type="text" id="customer-name" class="form-control" required>
                            </div>
                            <div class="form-group">
                                <label>Customer Email</label>
                                <input type="email" id="customer-email" class="form-control" required>
                            </div>
                            <div class="form-group">
                                <label>Phone Number</label>
                                <input type="tel" id="customer-phone" class="form-control" required>
                            </div>
                            <div class="form-group">
                                <label>Address</label>
                                <input type="text" id="customer-address" class="form-control" required>
                            </div>
                            <div class="form-group">
                                <label>Event Name</label>
                                <input type="text" id="event-name" class="form-control" placeholder="e.g., Wedding, Corporate Event">
                            </div>
                        </div>

                        <div class="form-group">
                            <label>Package Details</label>
                            <textarea id="package-details" class="form-control" rows="3" placeholder="What is included in the package?"></textarea>
                        </div>

                        <hr style="margin: 2rem 0; border: 0; border-top: 1px solid var(--border-color);">

                        <div class="grid grid-2">
                            <div class="form-group">
                                <label>Total Amount (₹)</label>
                                <input type="number" id="total-amount" class="form-control" required placeholder="0.00">
                            </div>
                            <div class="form-group">
                                <label>Advance Payment (₹)</label>
                                <input type="number" id="advance-payment" class="form-control" value="0">
                            </div>
                        </div>

                        <div class="form-group">
                            <label>Advance Payment Date</label>
                            <input type="date" id="advance-date" class="form-control">
                        </div>

                        <div id="installments-section" style="margin-top: 1.5rem;">
                            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 1rem;">
                                <h4>Installments (Optional)</h4>
                                <button type="button" class="btn btn-secondary btn-sm" onclick="app.addInstallmentRow()">
                                    <i class="fas fa-plus"></i> Add Installment
                                </button>
                            </div>
                            <div id="installments-container">
                                <!-- Installment rows will be added here -->
                            </div>
                        </div>

                        <div class="card" style="margin-top: 2rem; background: var(--sidebar-active); border: none;">
                            <div style="display: flex; justify-content: space-between; font-weight: 700; font-size: 1.1rem;">
                                <span>Remaining Balance:</span>
                                <span id="remaining-balance-display">₹0.00</span>
                            </div>
                        </div>

                        <div style="margin-top: 2rem; display: flex; gap: 1rem;">
                            <button type="submit" class="btn btn-primary" id="save-btn">
                                <span id="submit-btn-text">Save Invoice</span>
                            </button>
                            <button type="button" class="btn btn-secondary" id="save-download-btn">
                                <i class="fas fa-file-pdf"></i> Save & Download PDF
                            </button>
                            <button type="button" class="btn btn-secondary"
                                onclick="app.showPage('dashboard')">Cancel</button>
                        </div>
                    </form>
                </div>
            </section>

            <!-- Settings Section -->
            <section id="settings-section" class="page-section" style="display: none;">
                <div class="card">
                    <h3>Organization Settings</h3>
                    <form id="settings-form" style="margin-top: 1.5rem;">
                        <div class="form-group">
                            <label>Organization Name</label>
                            <input type="text" id="org-name" class="form-control" required>
                        </div>
                        <div class="grid grid-2">
                            <div class="form-group">
                                <label>Email Address</label>
                                <input type="email" id="org-email" class="form-control" required>
                            </div>
                            <div class="form-group">
                                <label>Phone Number</label>
                                <input type="tel" id="org-phone" class="form-control" required>
                            </div>
                        </div>
                        <div class="form-group">
                            <label>Logo</label>
                            <div style="display: flex; align-items: center; gap: 1.5rem;">
                                <div id="logo-preview"
                                    style="width: 100px; height: 100px; border: 2px dashed var(--border-color); border-radius: 0.5rem; display: flex; align-items: center; justify-content: center; overflow: hidden;">
                                    <i class="fas fa-image fa-2x" style="color: var(--text-secondary);"></i>
                                </div>
                                <div>
                                    <input type="file" id="org-logo-input" accept="image/*" style="display: none;">
                                    <button type="button" class="btn btn-secondary"
                                        onclick="document.getElementById('org-logo-input').click()">
                                        <i class="fas fa-upload"></i> Upload Logo
                                    </button>
                                </div>
                            </div>
                        </div>
                        <div style="margin-top: 2rem;">
                            <button type="submit" class="btn btn-primary">Save Settings</button>
                        </div>
                    </form>
                </div>
            </section>

            <!-- Preview Modal -->
            <div id="invoice-modal" class="modal" style="display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); z-index: 1000; justify-content: center; align-items: center;">
                <div class="card" style="width: 90%; max-width: 800px; max-height: 90vh; overflow-y: auto; position: relative;">
                    <button class="btn btn-secondary" onclick="app.closeModal()" style="position: absolute; top: 1rem; right: 1rem;">
                        <i class="fas fa-times"></i>
                    </button>
                    <div id="modal-content">
                        <!-- Preview content goes here -->
                    </div>
                    <div style="margin-top: 2rem; display: flex; gap: 1rem; justify-content: flex-end;">
                        <button class="btn btn-primary" id="modal-download-btn">
                            <i class="fas fa-download"></i> Download PDF
                        </button>
                        <button class="btn btn-secondary" onclick="app.closeModal()">Close</button>
                    </div>
                </div>
            </div>
        </main>

        <div id="toast-container" class="toast-container"></div>
    </div>

    <script src="js/api.js"></script>
    <script src="js/app.js"></script>
</body>

</html>
